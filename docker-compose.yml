services:
  arch-dev:
    build:
      context: .
      args:
        USER_NAME: ${USER_NAME:-ataparlar}
        GIT_EMAIL: ${GIT_EMAIL:-ataparlars5@gmail.com}
        GIT_NAME: ${GIT_NAME:-Ata Parlar}
    container_name: arch_dev
    hostname: arch-pc
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      # Expose Ollama API on all container interfaces so tools inside can reach it
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
          cpus: '0.000'
    volumes:
      - /home/ataparlar/projects:/home/${USER_NAME:-ataparlar}/projects
      - /home/ataparlar/data:/home/${USER_NAME:-ataparlar}/data
      # Persist Ollama models between container restarts
      - ollama_models:/home/${USER_NAME:-ataparlar}/.ollama

volumes:
  ollama_models:
